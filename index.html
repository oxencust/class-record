        async function submitForm() {
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '送出中...';
            
            try {
                // 上傳照片（如果有）
                if (photoFiles.length > 0) {
                    showToast(`正在上傳照片 0/${photoFiles.length}...`, 'info');
                    for (let i = 0; i < photoFiles.length; i++) {
                        showToast(`正在上傳照片 ${i + 1}/${photoFiles.length}...`, 'info');
                        const url = await uploadPhoto(photoFiles[i]);
                        if (url) uploadedPhotoUrls.push(url);
                    }
                }
                
                // 收集課間狀況
                const incidents = Array.from(document.querySelectorAll('#incidentGroup input:checked'))
                    .map(cb => cb.value);

                        // 收集本日訓練主軸（含「其他」文字）
                const focusItems = Array.from(document.querySelectorAll('#trainingFocusGroup input:checked'))
                    .map(cb => cb.value);
                const focusOtherText = document.getElementById('trainingFocusOtherText').value.trim();
                // 把「其他」替換成實際填寫的內容
                const focusItemsDisplay = focusItems.map(v => (v === '其他' && focusOtherText) ? ('其他:' + focusOtherText) : v);
                const trainingFocus = focusItemsDisplay.join('、');
                const specialNote = document.getElementById('specialNote').value.trim();
                
                const formData = {
                    action: 'submitClassRecord',
                    coachCode: currentCoach.id,
                    coachName: currentCoach.name,
                    memberId: selectedMember.id,
                    memberName: selectedMember.name,
                    classType: selectedClassType,
                    classDate: document.getElementById('classDate').value,
                    classTime: document.getElementById('classTime').value,
                    photos: uploadedPhotoUrls.join(','),
                    trainingContent: document.getElementById('trainingContent').value.trim(),
                    trainingFocus: trainingFocus,
                    specialNote: specialNote,
                    isLate: document.querySelector('input[name="isLate"]:checked').value === 'yes',
                    mentalStateRating: mentalStateValue,
                    incidentTypes: incidents.join(','),
                    needAdminFollowup: document.querySelector('input[name="needAdminFollowup"]:checked').value === 'yes',
                    adminFollowupNotes: document.getElementById('adminFollowupText').value.trim()
                };
                
                if (CONFIG.DEBUG_MODE) {
                    console.log('送出資料:', formData);
                    clearDraft();
                    showSuccess(formData.memberName);
                } else {
                    const response = await fetch(CONFIG.WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    // Make.com webhook 回傳 "Accepted" 文字（非 JSON），status 2xx 即成功
                    if (response.ok) {
                        clearDraft();
                        showSuccess(formData.memberName);
                    } else {
                        throw new Error('送出失敗: HTTP ' + response.status);
                    }
                }
            } catch (error) {
                console.error('送出失敗:', error);
                showToast('送出失敗：' + error.message, 'error');
            // 只有失敗時才恢復按鈕，成功後保持 disabled 防止重複送出
                submitBtn.disabled = false;
                submitBtn.textContent = '送出紀錄';
            }
        }
        
        async function uploadPhoto(file) {
            if (CONFIG.DEBUG_MODE) {
                return 'https://via.placeholder.com/200';
            }

            try {
                // 從 Edge Function 取得 ImageKit 簽名
                const authResult = await callEdge('getImageKitAuth');
                if (!authResult.success) throw new Error(authResult.error || '無法取得上傳簽名');

                const formData = new FormData();
                formData.append('file', file);
                formData.append('publicKey', authResult.publicKey);
                formData.append('signature', authResult.signature);
                formData.append('expire', String(authResult.expire));
                formData.append('token', authResult.token);
                const classDate = document.getElementById('classDate').value;
                formData.append('folder', `/class/${selectedMember.id}_${selectedMember.name}/${classDate}/`);
                formData.append('fileName', `${Date.now()}_${String(photoFiles.indexOf(file) + 1).padStart(3, '0')}.jpg`);

                const uploadResponse = await fetch('https://upload.imagekit.io/api/v1/files/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!uploadResponse.ok) {
                    const errText = await uploadResponse.text();
                    throw new Error('ImageKit 上傳失敗: ' + errText);
                }

                const uploadResult = await uploadResponse.json();
                return uploadResult.url;
            } catch (error) {
                console.error('照片上傳失敗:', error);
                showToast('照片上傳失敗: ' + error.message, 'error');
                return null;
            }
        }
        
        function showSuccess(memberName) {
            document.getElementById('successDesc').textContent = `${memberName || '學員'} 的課表紀錄已成功送出`;
            document.getElementById('successOverlay').classList.add('show');
        }

        function closeSuccess() {
            document.getElementById('successOverlay').classList.remove('show');
            resetForm();
        }

        function toggleFocusOtherInput() {
            const cb = document.getElementById('focus_other');
            const input = document.getElementById('trainingFocusOtherText');
            if (!cb || !input) return;
            if (cb.checked) {
                input.style.display = '';
                input.focus();
            } else {
                input.style.display = 'none';
                input.value = '';
            }
        }

        function resetForm() {
            selectedMember = null;
            photoFiles = [];
            uploadedPhotoUrls = [];
            mentalStateValue = 0;
            // 重置送出按鈕（上次送出成功後會保持 disabled 防重複點擊）
            var submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.textContent = '送出紀錄';
            }
            // 課程類型保留（教練預設類型不需重設）

            document.getElementById('memberInfoCard').classList.remove('show');
            document.getElementById('memberSearch').value = '';
            // 重設日期時間
            var now = new Date();
            document.getElementById('classDate').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
            document.getElementById('classTime').value = String(now.getHours()).padStart(2,'0') + ':00';
            document.getElementById('photoPreviewContainer').innerHTML = '';
            document.getElementById('trainingContent').value = '';
            document.getElementById('mentalState').value = '';
            document.querySelectorAll('#mentalStateRating .star').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('#incidentGroup input').forEach(cb => cb.checked = false);
            document.querySelectorAll('#trainingFocusGroup input').forEach(cb => cb.checked = false);
            var focusOther = document.getElementById('trainingFocusOtherText');
            if (focusOther) { focusOther.value = ''; focusOther.style.display = 'none'; }
            var specialNote = document.getElementById('specialNote');
            if (specialNote) specialNote.value = '';
            document.querySelectorAll('input[name="isLate"]').forEach(r => r.checked = false);
            document.querySelectorAll('input[name="needAdminFollowup"]').forEach(r => r.checked = false);
            document.getElementById('adminFollowupNotes').classList.remove('show');
            document.getElementById('adminFollowupText').value = '';
            
            updateRecordChecks();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // ============================================
        // 工具函數
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
